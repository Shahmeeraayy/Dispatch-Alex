<!doctype html>
<html>
  <body style="margin:0;padding:24px;background:#f3f7fb;font-family:Arial,sans-serif;color:#0f172a;">
    <div style="max-width:520px;margin:0 auto;background:#ffffff;border:1px solid #dbe5f0;border-radius:16px;overflow:hidden;">
      <div style="padding:24px 28px;background:#0b1f44;color:#ffffff;">
        <h1 style="margin:0;font-size:20px;line-height:28px;">SM2 Dispatch Password Reset</h1>
        <p style="margin:8px 0 0 0;font-size:14px;line-height:22px;color:#cbd5e1;">Use the verification code below to continue your password reset.</p>
      </div>
      <div style="padding:28px;">
        <p style="margin:0 0 16px 0;font-size:14px;line-height:22px;">Enter this one-time code in the app. It expires in 5 minutes.</p>
        <div style="margin:0 0 20px 0;padding:18px 16px;border-radius:14px;background:#ecfeff;border:1px solid #a5f3fc;text-align:center;">
          <span style="font-size:32px;line-height:1;font-weight:700;letter-spacing:10px;color:#155e75;">{{ otp_code }}</span>
        </div>
        <p style="margin:0;font-size:13px;line-height:20px;color:#475569;">If you did not request this reset, you can ignore this email. No password change will happen unless the code is verified.</p>
      </div>
    </div>
  </body>
</html>
